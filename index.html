var data={},cur=null,curCat="restaurants",mCat="restaurants",editCamp=false,editingItemId=null,_t0=0;

function hav(a,b,c,d){var R=6371,dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);return(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))).toFixed(1);}
async function geo(q){try{var r=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q)+"&limit=1",{headers:{"User-Agent":"CamperApp2026"}});var d=await r.json();if(d[0])return{lat:+d[0].lat,lon:+d[0].lon};}catch(e){}return null;}
function sd(id){if(!data[id])data[id]={};var d=data[id];if(!Array.isArray(d.items))d.items=[];if(!d.addr)d.addr="";if(!d.naam)d.naam="";if(d.img===undefined)d.img="";if(!d.coords)d.coords=null;return d;}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==="object")return Object.values(v);return[];}
function toast(m){var el=document.getElementById("toast");el.textContent=m;el.classList.add("on");setTimeout(function(){el.classList.remove("on");},2400);}
async function save(){if(!window._fbSave)return;try{await window._fbSave(data);_t0=Date.now();var dot=document.getElementById("sync-dot");if(dot){dot.classList.add("live");setTimeout(function(){dot.classList.remove("live");},1500);};}catch(e){toast("Opslaan mislukt");}}
function norm(rd){var d=rd||{};STOPS.forEach(function(s){if(!d[s.id])d[s.id]={};var x=d[s.id];x.items=toArr(x.items);if(!x.addr)x.addr=s.addr;if(!x.naam)x.naam=s.campsite;if(!x.coords)x.coords=s.coords;if(x.img===undefined)x.img="";});return d;}
async function startListening(){if(!window._fbLoad)return;var rd=await window._fbLoad();if(rd)data=norm(rd);renderOv();if(cur){renderCamp();renderCats();renderItems();}setInterval(async function(){if(Date.now()-_t0<5000)return;var r=await window._fbPoll();if(r){data=norm(r);renderOv();if(cur){renderCamp();renderCats();renderItems();}}},30000);}

function buildDropdowns(){
  var all=function(){return document.querySelectorAll("#nav-bar .nav-item,#nav-bar-det .nav-item");};
  all().forEach(function(item){
    var dd=item.querySelector(".dropdown");dd.innerHTML="";
    item.dataset.ids.split(",").forEach(function(id){var s=STOPS.find(function(x){return x.id===id;});if(!s)return;var d=document.createElement("div");d.className="dd-item";d.textContent=s.name;d.onclick=function(e){e.stopPropagation();all().forEach(function(i){i.classList.remove("open");});openStop(s);};dd.appendChild(d);});
    item.querySelector(".nav-label").addEventListener("click",function(e){e.stopPropagation();var op=item.classList.contains("open");all().forEach(function(i){i.classList.remove("open");});if(!op){item.classList.add("open");var ddEl=item.querySelector(".dropdown");var bw=document.body.getBoundingClientRect().width;var left=item.getBoundingClientRect().left;if(left+160>bw)left=bw-164;ddEl.style.left=Math.max(4,left)+"px";}});
  });
  document.addEventListener("click",function(){all().forEach(function(i){i.classList.remove("open");});});
}

function renderOv(){
  var grid=document.getElementById("stop-grid");grid.innerHTML="";
  STOPS.forEach(function(s){
    var d=sd(s.id);
    var card=document.createElement("div");card.className="scard";
    var hero=document.createElement("div");hero.className="sc-hero g-"+s.id;
    if(d.img){var im=document.createElement("img");im.src=d.img;im.loading="lazy";im.alt=s.name;im.onerror=function(){this.style.display="none";};hero.appendChild(im);}
    var ov=document.createElement("div");ov.className="sc-ov";hero.appendChild(ov);
    var ni=document.createElement("span");ni.className="sc-nights";ni.textContent=s.nights+" nacht"+(s.nights>1?"en":"");hero.appendChild(ni);
    card.appendChild(hero);
    var body=document.createElement("div");body.className="sc-body";
    var rt=REISTIJD[s.id];body.innerHTML="<div class=\"sc-name\">"+s.name+"</div><div class=\"sc-dates\">"+s.dates+"</div>"+(rt?"<div class=\"sc-travel\">→ "+rt.km+" · "+rt.time+"</div>":"")+(d.items.length?"<span class=\"sc-badge\">"+d.items.length+" idee\u00EBn</span>":"<span class=\"sc-badge e\">Voeg toe</span>");
    card.appendChild(body);card.onclick=function(){openStop(s);};grid.appendChild(card);
  });
}

function openStop(s){
  cur=s;curCat="restaurants";editCamp=false;
  document.getElementById("p-ov").classList.remove("on");document.getElementById("p-det").classList.add("on");
  var hero=document.getElementById("det-hero");hero.className="det-hero g-"+s.id;
  var old=hero.querySelector("img");if(old)old.remove();
  var d=sd(s.id);
  if(d.img){var im=document.createElement("img");im.src=d.img;im.onerror=function(){im.remove();};hero.prepend(im);}
  document.getElementById("d-name").textContent=s.name;
  document.getElementById("d-dates").textContent=s.dates+" \u00B7 "+s.nights+" nacht"+(s.nights>1?"en":"");
  document.getElementById("d-camp").textContent=(d.naam||s.campsite);
  renderCamp();renderCats();renderItems();window.scrollTo(0,0);
}
function goBack(){document.getElementById("p-det").classList.remove("on");document.getElementById("p-ov").classList.add("on");cur=null;renderOv();}

function renderCamp(){
  var el=document.getElementById("camp-card");var d=sd(cur.id);
  if(!editCamp){el.innerHTML="<div class=\"cc-lbl\">Slaapplaats</div><div class=\"cc-name\">"+(d.naam||cur.campsite)+"</div><div class=\"cc-addr\">"+(d.addr||"\u2014")+"</div>"+(d.coords?"<div class=\"cc-geo\">Locatie bekend \u2014 afstanden worden berekend</div>":"")+"<button class=\"cc-edit\" onclick=\"toggleEdit(true)\">\u270F\uFE0F Aanpassen</button>";}
  else{el.innerHTML="<div class=\"cc-lbl\">Aanpassen</div><div><label class=\"ei-lbl\">Naam camping</label><input class=\"ei\" id=\"ei-naam\" value=\""+(d.naam||cur.campsite)+"\"/></div><div><label class=\"ei-lbl\">Adres</label><div class=\"ei-row\"><input class=\"ei\" id=\"ei-addr\" value=\""+(d.addr||"")+"\"/><button class=\"ei-save\" onclick=\"saveCamp()\">Opslaan</button></div></div><div style=\"margin-top:8px\"><label class=\"ei-lbl\">Foto-URL</label><input class=\"ei\" id=\"ei-img\" value=\""+(d.img||"")+"\"/></div><span class=\"ei-cancel\" onclick=\"toggleEdit(false)\">Annuleer</span>";}
}
function toggleEdit(v){editCamp=v;renderCamp();}
async function saveCamp(){
  var naam=(document.getElementById("ei-naam")||{}).value||"";
  var addr=(document.getElementById("ei-addr")||{}).value||"";
  var img=(document.getElementById("ei-img")||{}).value||"";
  var c=await geo(addr.trim());if(!c)c=cur.coords;
  var d=sd(cur.id);d.naam=naam.trim();d.addr=addr.trim();d.coords=c;d.img=img.trim();
  if(c)d.items.forEach(function(i){if(i.coords)i.dist=hav(i.coords.lat,i.coords.lon,c.lat,c.lon);});
  await save();toast("Opgeslagen \u2713");editCamp=false;renderCamp();renderOv();
  var hero=document.getElementById("det-hero");var old=hero.querySelector("img");if(old)old.remove();
  if(img.trim()){var im=document.createElement("img");im.src=img.trim();im.onerror=function(){im.remove();};hero.prepend(im);}
  document.getElementById("d-camp").textContent=naam.trim()||cur.campsite;
}

function renderCats(){
  var row=document.getElementById("cat-row");row.innerHTML="";
  CATS.forEach(function(c){var n=sd(cur.id).items.filter(function(i){return i.cat===c.id;}).length;var t=document.createElement("button");t.className="ctab"+(curCat===c.id?" on":"");t.innerHTML=c.icon+" "+c.label+(n?" <span class=\"cn\">"+n+"</span>":"");t.onclick=function(){curCat=c.id;renderCats();renderItems();};row.appendChild(t);});
}
function renderItems(){
  var list=document.getElementById("item-list");var d=sd(cur.id);var cat=CATS.find(function(c){return c.id===curCat;});
  var items=d.items.filter(function(i){return i.cat===curCat;});
  items.sort(function(a,b){if(a.fav&&!b.fav)return -1;if(!a.fav&&b.fav)return 1;if(a.done&&!b.done)return 1;if(!a.done&&b.done)return -1;return 0;});
  list.innerHTML="";
  if(!items.length){list.innerHTML="<div class=\"empty-box\"><span class=\"eb-ico\">"+cat.icon+"</span><p class=\"eb-txt\">Nog geen "+cat.label.toLowerCase()+" toegevoegd.</p></div>";return;}
  items.forEach(function(item,idx){
    var card=document.createElement("div");card.className="icard"+(item.fav?" fav-card":"")+(item.done?" done-card":"");card.style.borderLeftColor=cat.color;
    var canUp=idx>0&&!items[idx-1].fav&&!item.done;var canDown=idx<items.length-1&&!items[idx+1].done&&!item.fav;
    card.innerHTML="<div class=\"ic-top\"><div class=\"ic-name\">"+item.name+"</div><div style=\"display:flex;gap:2px;flex-shrink:0;align-items:center\">"
      +"<button class=\"ic-star\" onclick=\"toggleFav('"+item.id+"')\">"+(item.fav?"⭐":"☆")+"</button>"
      +"<button class=\"ic-move\" onclick=\"moveItem('"+item.id+"',-1)\""+(canUp?"":" disabled")+">&uarr;</button>"
      +"<button class=\"ic-move\" onclick=\"moveItem('"+item.id+"',1)\""+(canDown?"":" disabled")+">&darr;</button>"
      +"<button class=\"ic-edit\" onclick=\"editItem('"+item.id+"')\">\u270F\uFE0F</button>"
      +"<button class=\"ic-del\" onclick=\"delItem('"+item.id+"')\">&#x2715;</button>"
      +"</div></div>"
      +"<div class=\"ic-meta\">"+(item.addr?"<span class=\"ic-addr\">"+item.addr+"</span>":"")+(item.dist?"<span class=\"ic-dist\">"+item.dist+" km</span>":"")+"</div>"
      +(item.link?"<div class=\"ic-link\"><a href=\""+item.link+"\" target=\"_blank\" rel=\"noopener\">Bekijk website &rarr;</a></div>":"")
      +(item.note?"<div class=\"ic-note\">"+item.note+"</div>":"")
      +"<button class=\"ic-done"+(item.done?" done":"")+\"" onclick=\"toggleDone('"+item.id+"')\">"+(item.done?"\u21A9 Toch niet gedaan":"\u25CB Markeer als gedaan")+"</button>"
      +"<div class=\"ic-when\">Toegevoegd "+item.when+"</div>";
    list.appendChild(card);
  });
}
async function toggleFav(id){var d=sd(cur.id);var i=d.items.find(function(x){return x.id===id;});if(i){i.fav=!i.fav;await save();renderItems();}}
async function toggleDone(id){var d=sd(cur.id);var i=d.items.find(function(x){return x.id===id;});if(i){i.done=!i.done;await save();renderItems();}}
async function moveItem(id,dir){var d=sd(cur.id);var cids=d.items.filter(function(i){return i.cat===curCat;}).map(function(i){return i.id;});var ci=cids.indexOf(id);var ni=ci+dir;if(ni<0||ni>=cids.length)return;var si=d.items.findIndex(function(i){return i.id===id;});var ti=d.items.findIndex(function(i){return i.id===cids[ni];});if(si>-1&&ti>-1){var tmp=d.items[si];d.items[si]=d.items[ti];d.items[ti]=tmp;await save();renderItems();}}
async function delItem(id){if(!confirm("Verwijderen?"))return;sd(cur.id).items=sd(cur.id).items.filter(function(i){return i.id!==id;});await save();renderCats();renderItems();}
function openModal(){editingItemId=null;mCat=curCat;renderMCats();["f-name","f-addr","f-link","f-notes"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("m-title").textContent="Nieuw idee \u2728";document.getElementById("btn-save").textContent="Toevoegen";document.getElementById("modal-bg").classList.add("on");setTimeout(function(){document.getElementById("f-name").focus();},80);}
function editItem(id){var d=sd(cur.id);var item=d.items.find(function(i){return i.id===id;});if(!item)return;editingItemId=id;mCat=item.cat;renderMCats();document.getElementById("f-name").value=item.name||"";document.getElementById("f-addr").value=item.addr||"";document.getElementById("f-link").value=item.link||"";document.getElementById("f-notes").value=item.note||"";document.getElementById("m-title").textContent="Idee bewerken \u270F\uFE0F";document.getElementById("btn-save").textContent="Opslaan";document.getElementById("modal-bg").classList.add("on");setTimeout(function(){document.getElementById("f-name").focus();},80);}
function closeModal(){document.getElementById("modal-bg").classList.remove("on");}
function closeModalOut(e){if(e.target.id==="modal-bg")closeModal();}
function renderMCats(){var el=document.getElementById("mcats");el.innerHTML="";CATS.forEach(function(c){var b=document.createElement("button");b.className="mc"+(mCat===c.id?" on":"");b.textContent=c.icon+" "+c.label;b.onclick=function(){mCat=c.id;renderMCats();};el.appendChild(b);});}
async function addItem(){
  var name=document.getElementById("f-name").value.trim();if(!name)return;
  var addr=document.getElementById("f-addr").value.trim();var link=document.getElementById("f-link").value.trim();var note=document.getElementById("f-notes").value.trim();
  var btn=document.getElementById("btn-save");btn.disabled=true;btn.textContent="Even geduld\u2026";
  _t0=Date.now()-4000;
  var coords=addr?await geo(addr):null;var d=sd(cur.id);
  var dist=coords&&d.coords?hav(coords.lat,coords.lon,d.coords.lat,d.coords.lon):null;
  if(editingItemId){var idx=d.items.findIndex(function(i){return i.id===editingItemId;});if(idx>-1){var ex=d.items[idx];d.items[idx]=Object.assign({},ex,{cat:mCat,name:name,addr:addr,link:link,note:note,coords:coords||ex.coords,dist:dist||ex.dist});};toast("Opgeslagen \u2713");}
  else{d.items.push({id:Date.now()+"",cat:mCat,name:name,addr:addr,link:link,note:note,coords:coords,dist:dist,when:new Date().toLocaleDateString("nl-NL")});toast("Toegevoegd \u2713");}
  await save();btn.disabled=false;btn.textContent="Toevoegen";closeModal();curCat=mCat;renderCats();renderItems();
}
function updateCountdown(){var el=document.getElementById("cd-days");if(!el)return;var diff=new Date("2026-07-16T00:00:00")-new Date();if(diff<=0){el.textContent="🚐";document.querySelector(".cd-label").textContent="onderweg!";}else{el.textContent=Math.ceil(diff/864e5);}}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
STOPS.forEach(function(s){if(!data[s.id])data[s.id]={addr:s.addr,coords:s.coords,naam:s.campsite,img:"",items:[]};}); 
buildDropdowns();renderOv();updateCountdown();setInterval(updateCountdown,60000);
function tryFB(n){if(window._fbLoad)startListening();else if(n>0)setTimeout(function(){tryFB(n-1);},300);}
setTimeout(function(){tryFB(15);},300);
</script>
</body>
</html>
